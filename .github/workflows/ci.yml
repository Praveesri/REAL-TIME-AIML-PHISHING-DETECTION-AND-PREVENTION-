name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'    
    - name: Install dependencies and Build Frontend
      working-directory: ./frontend
      run: |
        npm install
        npm run build

  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn scikit-learn pandas bs4 requests tldextract pydantic joblib uvicorn[standard]
    - name: Generate the ML Dataset and Train Model
      working-directory: ./backend
      run: |
        python ml_model.py
